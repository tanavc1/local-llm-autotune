name: Docker Hub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Secret guard ─────────────────────────────────────────────────────
      # Sets SKIP=true (via GITHUB_ENV) when credentials are absent so every
      # subsequent step can gate on `if: env.SKIP != 'true'`.  The job exits
      # green with a warning annotation rather than red — a missing secret is
      # a setup task, not a code failure.
      - name: Check Docker Hub credentials
        run: |
          MISSING=""
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && MISSING="$MISSING DOCKERHUB_USERNAME"
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]    && MISSING="$MISSING DOCKERHUB_TOKEN"
          if [[ -n "$MISSING" ]]; then
            echo "::warning::Docker Hub secrets not configured ($MISSING) — image build skipped."
            echo ""
            echo "One-time setup (takes ~5 min):"
            echo "  1. hub.docker.com → Account Settings → Security → New Access Token"
            echo "  2. github.com/tanavc1/local-llm-autotune/settings/secrets/actions → add:"
            echo "       DOCKERHUB_USERNAME = tanavc1"
            echo "       DOCKERHUB_TOKEN    = <token from step 1>"
            echo "  3. Re-run this job from the Actions tab — no re-tag needed."
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "✓ Docker Hub credentials present — proceeding."
          fi

      - name: Set up QEMU (for linux/arm64 cross-compilation)
        if: env.SKIP != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.SKIP != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.SKIP != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PyPI publishing runs in parallel — wait until the version appears
      - name: Wait for PyPI propagation
        if: env.SKIP != 'true'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          echo "Waiting for llm-autotune==$VERSION on PyPI..."
          for i in $(seq 1 24); do
            if curl -sf "https://pypi.org/pypi/llm-autotune/$VERSION/json" > /dev/null; then
              echo "Found llm-autotune==$VERSION on PyPI after $((i * 30))s"
              exit 0
            fi
            echo "  attempt $i/24 — sleeping 30s..."
            sleep 30
          done
          echo "ERROR: llm-autotune==$VERSION not found on PyPI after 12 minutes"
          exit 1

      - name: Build and push (linux/amd64 + linux/arm64)
        if: env.SKIP != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.autotune
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AUTOTUNE_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            tanavc1/llm-autotune:${{ steps.meta.outputs.version }}
            tanavc1/llm-autotune:latest
          labels: |
            org.opencontainers.image.title=llm-autotune
            org.opencontainers.image.description=39% faster TTFT for local LLMs — autotune optimises Ollama, LM Studio, and MLX with zero config
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/tanavc1/local-llm-autotune
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: env.SKIP != 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: tanavc1/llm-autotune
          short-description: "39% faster TTFT for local LLMs — autotune optimises Ollama, LM Studio, and MLX with zero config"
          readme-filepath: ./README.md
