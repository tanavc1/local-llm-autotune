name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on v1.0.0, v1.1.0, etc.

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel installs and CLI is importable
        run: |
          pip install dist/*.whl
          python -c "import autotune; print('autotune', autotune.__version__)"
          autotune --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: none
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true
          attestations: false

  sync-homebrew-tap:
    name: Sync Homebrew tap
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push formula to homebrew-autotune tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tanavc1/homebrew-autotune.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp Formula/llm-autotune.rb /tmp/tap/Formula/llm-autotune.rb
          cd /tmp/tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/llm-autotune.rb
          git diff --cached --quiet && echo "Formula unchanged — skipping commit" && exit 0
          git commit -m "chore: update llm-autotune to ${GITHUB_REF_NAME}"
          git push
