name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on v1.0.0, v1.1.0, etc.

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel installs and CLI is importable
        run: |
          pip install dist/*.whl
          python -c "import autotune; print('autotune', autotune.__version__)"
          autotune --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: none
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true
          attestations: false

  sync-homebrew-tap:
    name: Sync Homebrew tap
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push updated formula to homebrew-autotune tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Guard: skip gracefully if the PAT hasn't been configured yet.
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — Homebrew tap sync skipped."
            echo ""
            echo "One-time setup (takes ~5 min):"
            echo "  1. Create repo: github.com/new  →  name: homebrew-autotune  (public)"
            echo "     Add Formula/ folder (any file inside to initialise the repo)."
            echo "  2. github.com/settings/tokens → New token (classic)"
            echo "     Scopes: repo  →  copy the token"
            echo "  3. github.com/tanavc1/local-llm-autotune/settings/secrets/actions → add:"
            echo "       HOMEBREW_TAP_TOKEN = <token from step 2>"
            echo "  4. Re-run this job from the Actions tab — no re-tag needed."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"

          # Fetch the new tarball URL + SHA256 from PyPI (publish-pypi already finished)
          PYPI_JSON=$(curl -sf "https://pypi.org/pypi/llm-autotune/${VERSION}/json")
          TARBALL_URL=$(echo "$PYPI_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          sdist = next(f for f in d['urls'] if f['packagetype'] == 'sdist')
          print(sdist['url'])
          ")
          TARBALL_SHA=$(echo "$PYPI_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          sdist = next(f for f in d['urls'] if f['packagetype'] == 'sdist')
          print(sdist['digests']['sha256'])
          ")

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tanavc1/homebrew-autotune.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp Formula/llm-autotune.rb /tmp/tap/Formula/llm-autotune.rb

          # Patch the main-package URL and SHA256 in the copied formula
          sed -i "s|^  url \"https://files\.pythonhosted\.org[^\"]*\"|  url \"${TARBALL_URL}\"|" \
            /tmp/tap/Formula/llm-autotune.rb
          # Replace only the first sha256 line (main package; resource sha256s stay unchanged)
          sed -i "0,/^  sha256 \"[a-f0-9]\{64\}\"/{s/^  sha256 \"[a-f0-9]\{64\}\"/  sha256 \"${TARBALL_SHA}\"/}" \
            /tmp/tap/Formula/llm-autotune.rb

          cd /tmp/tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/llm-autotune.rb
          git diff --cached --quiet && echo "Formula unchanged — skipping commit" && exit 0
          git commit -m "chore: update llm-autotune to ${GITHUB_REF_NAME}"
          git push
