[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autotune"
version = "0.1.0"
description = "Automatic local-LLM inference configuration recommender"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "psutil>=5.9",
    "rich>=13.0",
    "py-cpuinfo>=9.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
]

[project.optional-dependencies]
# Apple Silicon acceleration — install with: pip install autotune[mlx]
mlx = ["mlx-lm>=0.21"]
# Development / testing — install with: pip install autotune[dev]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
]

[project.scripts]
autotune = "autotune.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["autotune"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["autotune"]
omit = ["autotune/api/backends/mlx_backend.py"]  # requires mlx hardware

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
