# autotune Docker Compose — three deployment options
#
# OPTION A — single container (simpler, Ollama bundled inside)
# ------------------------------------------------------------
#   docker compose --profile single up
#
# OPTION B — two containers (autotune + Ollama as separate services)
# ------------------------------------------------------------------
#   docker compose --profile multi up
#
# OPTION C — team deployment (API-key auth + nginx reverse proxy)
# ---------------------------------------------------------------
#   ./setup.sh          # generate .env with AUTOTUNE_ADMIN_KEY
#   docker compose --profile team up
#
# Team mode exposes autotune via nginx on port 80 (HTTP).
# For TLS, see nginx/autotune.conf — drop in a cert and uncomment the HTTPS block.
#
# All options persist models in a named volume so they survive container restarts.

services:

  # ── Option A: autotune + Ollama in one container ────────────────────────────
  autotune-bundled:
    profiles: ["single"]
    build:
      context: .
      dockerfile: Dockerfile
    image: autotune:latest
    ports:
      - "8765:8765"   # autotune OpenAI-compatible API
      - "11434:11434" # Ollama direct access (optional — remove if not needed)
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_MODEL: ""              # set to "llama3.2:3b" to auto-pull on first boot
      AUTOTUNE_PORT: "8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Option B: Ollama service ─────────────────────────────────────────────────
  ollama:
    profiles: ["multi"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Option B: autotune service ───────────────────────────────────────────────
  autotune:
    profiles: ["multi"]
    build:
      context: .
      dockerfile: Dockerfile.autotune  # lightweight Python-only image (no Ollama)
    ports:
      - "8765:8765"
    environment:
      AUTOTUNE_OLLAMA_URL: "http://ollama:11434"
      AUTOTUNE_PORT: "8765"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Option C: Ollama (shared with multi profile) ────────────────────────────
  ollama-team:
    profiles: ["team"]
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Option C: autotune (API-key auth enabled) ────────────────────────────────
  autotune-team:
    profiles: ["team"]
    build:
      context: .
      dockerfile: Dockerfile.autotune
    env_file:
      - .env
    environment:
      AUTOTUNE_OLLAMA_URL: "http://ollama-team:11434"
      AUTOTUNE_PORT: "8765"
      AUTOTUNE_REQUIRE_API_KEY: "1"
    depends_on:
      ollama-team:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Option C: nginx reverse proxy ────────────────────────────────────────────
  nginx:
    profiles: ["team"]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/autotune.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      autotune-team:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_models:
