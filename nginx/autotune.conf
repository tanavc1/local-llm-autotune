# autotune nginx reverse proxy configuration
#
# Drop this file into /etc/nginx/conf.d/ (or use the Docker team profile which
# mounts it automatically).
#
# HTTP-only by default.  To enable HTTPS, place your certificate files in
# nginx/certs/ and uncomment the TLS server block below, then remove or
# redirect the HTTP block.

# Rate-limit zones
limit_req_zone $binary_remote_addr zone=autotune:10m    rate=10r/s;   # inference
limit_req_zone $binary_remote_addr zone=login:1m        rate=5r/m;    # dashboard login — max 5 attempts/min per IP

# Gzip for dashboard/API JSON (not streaming — those disable buffering per-location)
gzip              on;
gzip_types        application/json text/plain text/css application/javascript;
gzip_min_length   256;
gzip_vary         on;

upstream autotune_backend {
    server autotune-team:8765;
    keepalive 32;
}

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Max request body — allow large prompt payloads
    client_max_body_size 64m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;

    # Timeouts generous enough for long LLM generations
    proxy_read_timeout     600s;
    proxy_send_timeout     600s;
    proxy_connect_timeout  10s;

    # Pass real client IP to autotune
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket / SSE support (used by streaming completions)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Inference endpoints: rate-limit + disable buffering for streaming tokens
    location /v1/ {
        limit_req zone=autotune burst=20 nodelay;
        proxy_buffering off;
        proxy_cache     off;
        proxy_pass http://autotune_backend;
    }

    # Login endpoint — strict rate limit (5 req/min per IP, no burst)
    location = /dashboard/login {
        limit_req zone=login nodelay;
        limit_req_status 429;
        proxy_pass http://autotune_backend;
    }

    # Dashboard and admin endpoints — buffered (gzip applies), no rate limit
    location / {
        proxy_pass http://autotune_backend;
    }
}

# ── HTTPS (optional) ─────────────────────────────────────────────────────────
# Uncomment and fill in your domain + cert paths to enable TLS.
# Place cert files in nginx/certs/ (they are volume-mounted read-only).
# See docs/team-tls.md for Caddy (auto-renew) and certbot instructions.
