# autotune nginx reverse proxy configuration
#
# Drop this file into /etc/nginx/conf.d/ (or use the Docker team profile which
# mounts it automatically).
#
# HTTP-only by default.  To enable HTTPS, place your certificate files in
# nginx/certs/ and uncomment the TLS server block below, then remove or
# redirect the HTTP block.

# Rate-limit zone — 10 req/s per IP, burst of 20
limit_req_zone $binary_remote_addr zone=autotune:10m rate=10r/s;

upstream autotune_backend {
    server autotune-team:8765;
    keepalive 32;
}

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Streaming: disable buffering so tokens reach the client immediately
    proxy_buffering        off;
    proxy_cache            off;

    # Timeouts generous enough for long LLM generations
    proxy_read_timeout     600s;
    proxy_send_timeout     600s;
    proxy_connect_timeout  10s;

    # Pass real client IP to autotune
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket / SSE support (used by streaming completions)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Apply rate limit to all inference endpoints
    location /v1/ {
        limit_req zone=autotune burst=20 nodelay;
        proxy_pass http://autotune_backend;
    }

    # Dashboard and admin endpoints — no rate limit
    location / {
        proxy_pass http://autotune_backend;
    }
}

# ── HTTPS (optional) ─────────────────────────────────────────────────────────
# Uncomment and fill in your domain + cert paths to enable TLS.
# Place cert files in nginx/certs/ (they are volume-mounted read-only).
